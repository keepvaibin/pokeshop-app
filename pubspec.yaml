name: pokeshop_app
description: Cross-platform SCTCG Pokeshop mobile app.
publish_to: 'none'
version: 0.1.8+9

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  confetti: ^0.7.0
  cupertino_icons: ^1.0.8
  dio: ^5.4.3
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_html: ^3.0.0-beta.2
  flutter_image_compress: ^2.3.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10+1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  json_annotation: ^4.9.0
  package_info_plus: ^8.0.0
  pdf: ^3.11.1
  printing: ^5.13.4
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.1
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/pkmn_icons/
    - assets/other/
